global:
  scrape_interval: 5s
  scrape_timeout: 3s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'backends'
    static_configs:
      - targets: ['bo-go:8080', 'bo-rust:8080', 'bo-rails:8080', 'bo-node:8080', 'bo-python:8080', 'bo-php:8086', 'tax-service:8080', 'results-api:8080']
        labels:
          group: 'backend'

  - job_name: 'router'
    static_configs:
      - targets: ['router:8080']
        labels:
          group: 'routing'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
